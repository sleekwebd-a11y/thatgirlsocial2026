<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Velvet 21 • Day 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-950 text-white font-sans min-h-screen overflow-x-hidden">

<div class="max-w-[420px] mx-auto bg-neutral-950 min-h-screen flex flex-col shadow-2xl">

  <!-- HEADER - Bankroll now huge & obvious -->
  <header class="bg-gradient-to-br from-emerald-900 to-black px-6 py-6 border-b border-emerald-500/30">
    <div class="flex items-center justify-between">
      <h1 class="text-5xl font-bold tracking-tighter" style="font-family: 'Space Grotesk', sans-serif;">VELVET<span class="text-emerald-400">21</span></h1>
      <div onclick="showBankrollModal()" class="text-right cursor-pointer active:scale-95 transition">
        <p class="text-xs text-neutral-400">YOUR BANKROLL</p>
        <p id="bankroll-display" class="text-5xl font-bold text-emerald-400">$2500</p>
      </div>
    </div>
  </header>

  <!-- TABLE -->
  <main class="flex-1 p-5 relative" style="background: radial-gradient(circle at center, #052e16 0%, #000000 70%);">
    <div class="mb-8">
      <p class="text-xs text-neutral-400 mb-2 text-center">DEALER <span id="dealer-total" class="font-mono"></span></p>
      <div id="dealer-hand" class="flex justify-center gap-3 min-h-[110px]"></div>
    </div>
    <div>
      <p class="text-xs text-neutral-400 mb-2 text-center">YOU <span id="player-total" class="font-mono"></span></p>
      <div id="player-hand" class="flex justify-center gap-3 min-h-[110px]"></div>
    </div>
  </main>

  <!-- SIDE BETS + CONTROLS -->
  <div class="bg-neutral-900 border-t border-neutral-800 p-5">
    <!-- Side Bets -->
    <div class="grid grid-cols-2 gap-3 mb-6">
      <div onclick="selectTarget('perfect')" id="perfect-box" class="bet-box bg-neutral-800 rounded-2xl p-4 cursor-pointer">
        <p class="text-purple-400 text-sm">Perfect Pairs</p>
        <p id="perfect-bet" class="text-3xl font-bold">$0</p>
        <p class="text-[10px] text-neutral-400">up to 25:1</p>
      </div>
      <div onclick="selectTarget('21plus3')" id="21plus3-box" class="bet-box bg-neutral-800 rounded-2xl p-4 cursor-pointer">
        <p class="text-amber-400 text-sm">21 + 3</p>
        <p id="21plus3-bet" class="text-3xl font-bold">$0</p>
        <p class="text-[10px] text-neutral-400">9:1</p>
      </div>
    </div>

    <!-- Bet Target -->
    <div class="flex gap-2 mb-4 text-xs font-medium">
      <button onclick="selectTarget('main')" id="target-main" class="flex-1 py-3 bg-emerald-600 rounded-2xl">MAIN BET</button>
      <button onclick="selectTarget('perfect')" id="target-perfect" class="flex-1 py-3 bg-neutral-800 rounded-2xl">PERFECT PAIRS</button>
      <button onclick="selectTarget('21plus3')" id="target-21plus3" class="flex-1 py-3 bg-neutral-800 rounded-2xl">21+3</button>
    </div>

    <!-- Chips -->
    <div class="grid grid-cols-6 gap-2 mb-6">
      <button onclick="placeBet(5)" class="chip">5</button>
      <button onclick="placeBet(25)" class="chip">25</button>
      <button onclick="placeBet(50)" class="chip">50</button>
      <button onclick="placeBet(100)" class="chip">100</button>
      <button onclick="placeBet(500)" class="chip">500</button>
      <button onclick="placeBet(999999)" class="chip text-rose-400">ALL</button>
    </div>

    <button onclick="dealHand()" id="deal-btn" class="w-full py-6 bg-emerald-500 rounded-3xl text-xl font-bold">DEAL CARDS</button>
  </div>

  <!-- Current Total Wager -->
  <div class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-neutral-900 border border-emerald-500/30 px-8 py-3 rounded-3xl text-center shadow-2xl">
    <span class="text-xs text-neutral-400">TOTAL WAGERED</span>
    <p id="total-wagered" class="text-2xl font-bold">$0</p>
  </div>

</div>

<!-- Bankroll Modal -->
<div id="bankroll-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
  <div class="bg-neutral-900 rounded-3xl p-8 w-80 text-center">
    <h3 class="text-2xl font-semibold mb-6">Set Your Bankroll</h3>
    <input id="modal-bankroll" type="number" class="w-full text-center text-6xl font-bold bg-neutral-800 rounded-2xl py-6 outline-none">
    <button onclick="saveBankroll()" class="mt-6 w-full py-5 bg-emerald-500 rounded-3xl text-lg font-semibold">SAVE BANKROLL</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
